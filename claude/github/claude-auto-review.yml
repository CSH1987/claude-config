# Claude 자동 코드 리뷰 — 모든 Pull Request 에서 실행.
#
# 인증: 당신의 Claude 구독(Pro/Max) → OAuth 토큰을 레포 시크릿
#   CLAUDE_CODE_OAUTH_TOKEN 으로 저장해서 사용합니다. 발급:
#     claude setup-token        # 1년짜리 토큰, 출력값 복사
#   저장(둘 중 하나):
#     gh secret set CLAUDE_CODE_OAUTH_TOKEN     # 직접
#     claude-review                             # claude-config 헬퍼(권장)
#   → API 종량 과금 없음. 리뷰 호출은 구독 사용량에서 차감됩니다.
#
# 주의: 구독 OAuth 는 anthropic_api_key 가 아니라 전용 입력 claude_code_oauth_token
#       을 써야 합니다 (인증 흐름이 다름 — 키를 바꿔 쓰면 실패).
#
# 이 파일은 claude-config 의 `claude-review` 명령이 생성/갱신합니다.
# 모델·프롬프트는 취향대로 수정하세요. 끄려면 이 파일을 삭제하면 됩니다.
name: Claude Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# 최소 권한: 코드 읽기 + 리뷰 코멘트 작성 + OIDC(id-token: 액션 인증에 필수).
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # 드래프트 PR 과 Dependabot 은 건너뜀(원하면 이 줄 삭제해 전부 리뷰).
    if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          # 구독 OAuth 토큰 (anthropic_api_key 아님 — 인증 흐름이 다름).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 진행/요약 코멘트 자동 게시.
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            이 PR의 변경사항을 코드 리뷰해줘. 중점:
            - 정확성 버그 · 로직 오류 · 놓친 엣지케이스
            - 보안 이슈(시크릿 노출, 인젝션, 잘못된 권한 등)
            - 더 단순하거나 효율적으로 만들 수 있는 부분
            구체적 코드 라인은 mcp__github_inline_comment__create_inline_comment
            (confirmed: true) 로 인라인 코멘트, 전체 총평은 `gh pr comment` 로 남겨줘.
            반드시 GitHub 코멘트로 게시(메시지로만 끝내지 말 것). 모두 한국어로.
            사소한 스타일 지적은 최소화.
          # 코멘트 게시 도구 허용 — 없으면 리뷰가 PR 에 안 남음(권한 거부). Sonnet 기본(구독 절약).
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)" --max-turns 15 --model claude-sonnet-4-6'
